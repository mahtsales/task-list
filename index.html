<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <title>Task-List</title>
</head>
<body>

    <h1>Task-List-📝</h1>
    <h3>Digite uma tarefa:</h3>

<!--Adicionando caixa de texto-->
    <input 
    type="text" 
    id="taskInput" 
    placeholder="Digite sua tarefa aqui"
    >

<!--Adicionando o botão de adição de tarefa-->
    <button 
    type="button" 
    id="taskBtn">
    Adicionar</button>

<!--Adicionando a lista não ordenada, para assim, acompanhar as tasks-->
    <ul 
    id="taskList">
    </ul>

</body>
</html>
